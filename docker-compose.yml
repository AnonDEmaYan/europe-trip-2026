services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      TRIP_SITE_USER: ${TRIP_SITE_USER:-Intltravel2k26}
      TRIP_SITE_PASSWORD: ${TRIP_SITE_PASSWORD:-Intltravel@2k26}
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
