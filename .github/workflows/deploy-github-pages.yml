# Deploy the static site in /public to GitHub Pages
# Repo root = this folder (europe-trip-site). Site files live in public/

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Required: PAGES_SITE_USER + PAGES_SITE_PASSWORD or deploy fails (see GITHUB-PAGES.md).
      - name: Apply Pages login (from secrets)
        env:
          PAGES_SITE_USER: ${{ secrets.PAGES_SITE_USER }}
          PAGES_SITE_PASSWORD: ${{ secrets.PAGES_SITE_PASSWORD }}
        run: node scripts/write-pages-auth.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
