<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="t d">
  <title id="t">Placeholder venue image</title>
  <desc id="d">Replace with your own photo in public/img/venues</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3ebe3"/>
      <stop offset="100%" style="stop-color:#e8dfd4"/>
    </linearGradient>
  </defs>
  <rect width="960" height="720" fill="url(#g)"/>
  <rect x="80" y="80" width="800" height="560" rx="20" fill="none" stroke="#2a6f7c" stroke-width="3" opacity="0.35"/>
  <text x="480" y="330" text-anchor="middle" fill="#2a6f7c" font-family="Georgia,serif" font-size="36" font-weight="700">img/venues</text>
  <text x="480" y="390" text-anchor="middle" fill="#5c6578" font-family="system-ui,sans-serif" font-size="22">Add your JPG / WebP / SVG here</text>
  <text x="480" y="430" text-anchor="middle" fill="#c45c3e" font-family="system-ui,sans-serif" font-size="18">Set localImage in places-data.js</text>
</svg>
